Aa<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankit Fitness Diet</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {background:#0d0d0d;color:white;font-family:Arial;margin:0;}
.header {background:#111;padding:15px;text-align:center;border-bottom:2px solid red;}
.container {padding:15px;max-width:600px;margin:auto;}
.box {background:#1c1c1c;padding:10px;margin:10px 0;border-radius:8px;}
button {width:100%;padding:12px;margin-top:10px;background:red;color:white;border:none;border-radius:8px;}
#result {background:#111;margin-top:15px;padding:15px;border-radius:8px;}
input{width:100%;padding:10px;margin:5px 0;background:#1c1c1c;color:white;border:none;border-radius:8px;}
</style>
</head>

<body>

<div class="header">
<h2>Ankit Fitness Trainer</h2>
<p>Glofit Gym Gurugram | 8532068762</p>
</div>

<div class="container">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<button onclick="setGoal('Weight Loss')">Weight Loss</button>
<button onclick="setGoal('Fat Loss')">Fat Loss</button>
<button onclick="setGoal('Weight Gain')">Weight Gain</button>

<div id="diet"></div>

<button onclick="generate()">Generate Diet</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="result"></div>

</div>

<script>

let goal="";

const data = {
"Weight Loss":{
"Empty Stomach (7:00 AM)":[
"Green Tea","Black Coffee","Lemon Water"
],
"Breakfast (9:00 AM)":[
"Oats","Upma","Boiled Eggs"
],
"Lunch (1:30 PM)":[
"Dal + Roti","Chicken + Salad"
],
"Snack (5:00 PM)":[
"Fruit","Green Tea"
],
"Dinner (8:30 PM)":[
"Soup","Paneer","Grilled Chicken"
]
}
};

function setGoal(g){
goal=g;
load();
}

function load(){

let meals=data[goal];
let html="";

for(let m in meals){

html+=`<div class="box"><b>${m}</b>`;

meals[m].forEach(item=>{
html+=`<br><label>
<input type="checkbox" data-meal="${m}" value="${item}">
${item}
</label>`;
});

html+="</div>";
}

document.getElementById("diet").innerHTML=html;
}

function generate(){

let meals=data[goal];

let html="<h3>Diet Plan</h3>";

for(let m in meals){

let selected=document.querySelectorAll(`input[data-meal="${m}"]:checked`);

if(selected.length>0){
html+=`<h4>${m}</h4>`;

selected.forEach(i=>{
html+=`<p>✔ ${i.value}</p>`;
});
}
}

document.getElementById("result").innerHTML=html;
}

function downloadPDF(){

let element=document.getElementById("result");

if(element.innerHTML===""){
alert("Generate first");
return;
}

// clean clone
let pdf=document.createElement("div");
pdf.innerHTML=element.innerHTML;
pdf.style.background="white";
pdf.style.color="black";
pdf.style.padding="20px";

document.body.appendChild(pdf);

html2pdf().from(pdf).save("DietPlan.pdf").then(()=>{
document.body.removeChild(pdf);
});

}

</script>

</body>
</html>
